<html>
<head>
<title>Momir Simulator</title>
<script>
const sf_url = "https://api.scryfall.com/cards/random?q=";

function populate_card(data) {
  var pop = ['name', 'mana_cost', 'type_line', 'oracle_text', 'flavor_text', 'artist' ];
  for (const idx in pop) {
    if (data[pop[idx]]) {
      document.getElementById(pop[idx]).innerHTML = manify(data[pop[idx]]);
    }
    else {
      document.getElementById(pop[idx]).innerHTML = "";
    }
  }
  document.getElementById('art_crop').src = data.image_uris.art_crop;
  if (data.power > -1) {
    document.getElementById('p_t').innerHTML = data.power + "/" + data.toughness;
  }
  else {
    document.getElementById('p_t').innerHTML = "";
  }
}

function manify(input) {
  input = input.replace(/\n/g,"<br/>");
  input = input.replace(/{/g,"<abbr class='card-symbol card-symbol-");
  input = input.replace(/}/g,"'></abbr>");
  return input;
}

function onLoad() {
  const urlParams = new URLSearchParams(window.location.search);
  const mv = urlParams.get('mv');
  if (mv) {
    fetch(sf_url.concat('t%3Acreature+mv%3D' + mv))
      .then( response => { return response.json() })
      .then((data) => { populate_card(data) });
  }
}

</script>
<style>
td {
  font-size: x-large;
}

@media print {
  .no-print, no-print * {
    display: none !important;
  }
}
</style>
<link rel="stylesheet" href="card-symbols.css">
</head>
<body onLoad="onLoad()">
<table>
<tr><td id="name"></td><td id="mana_cost" align="right"></td></tr>
<tr><td id="img" colspan="2" align="center"><img id="art_crop" /></td></tr>
<tr><td id="type_line" colspan="2"></td></tr>
<tr><td id="oracle_text" colspan="2"></td></tr>
<tr><td id="flavor_text" colspan="2" style="font-style: italic;"></td></tr>
<tr><td id="p_t" colspan="2" align="right"></td></tr>
<tr><td id="artist" colspan="2" align="center"></td></tr>
</table>
<button class="no-print" type="button" onClick="fetch(sf_url.concat('t%3Acreature+mv%3D' + prompt('Enter mana value:'))).then( response => { return response.json() }).then((data) => { populate_card(data) });" style="align-items: center;"> Mo Card </button>
<button class="no-print" type="button" onClick="fetch(sf_url.concat('t%3Aequipment+mv<%3D' + prompt('Enter mana value:'))).then( response => { return response.json() }).then((data) => { populate_card(data) });" style="align-items: center;"> Sto Card </button>

</body>
</html>
