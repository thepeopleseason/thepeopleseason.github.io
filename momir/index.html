<html>
<head>
<title>Momir Simulator</title>
<script>
const sf_url = "https://api.scryfall.com/cards/random?q=";

function populate_card(data) {
  var pop = ['name', 'mana_cost', 'type_line', 'oracle_text', 'artist' ];
  for (const idx in pop) {
    if (data[pop[idx]]) {
      document.getElementById(pop[idx]).innerHTML = manify(data[pop[idx]]);
    }
    else {
      document.getElementById(pop[idx]).innerHTML = "";
    }
  }
  document.getElementById('art_crop').src = data.image_uris.art_crop;
  if (data.power > -1) {
    document.getElementById('p_t').innerHTML = data.power + "/" + data.toughness;
  }
  else {
    document.getElementById('p_t').innerHTML = "";
  }
}

function manify(input) {
  input = input.replace(/\n/g,"<br/>");
  input = input.replace(/{/g,"<abbr class='card-symbol card-symbol-");
  input = input.replace(/}/g,"'></abbr>");
  return input;
}

function onLoad() {
  const urlParams = new URLSearchParams(window.location.search);
  const mv = urlParams.get('mv');
  if (mv) {
    fetch(sf_url.concat('t%3Acreature+mv%3D' + mv))
      .then( response => { return response.json() })
      .then((data) => { populate_card(data) });
  }
}

</script>
<style>
td {
  font-size: 50px;
}

@media print {
  .no-print, no-print * {
    font-size: 50px;
    display: none !important;
  }
}
</style>
<link rel="stylesheet" href="card-symbols.css">
</head>
<body onLoad="onLoad()">
<table>
<tr><td id="name"></td><td id="mana_cost" align="right"></td></tr>
<tr><td id="img" colspan="2" align="center"><img id="art_crop" /></td></tr>
<tr><td id="type_line" colspan="2"></td></tr>
<tr><td id="oracle_text" colspan="2"></td></tr>
<tr><td id="p_t" colspan="2" align="right"></td></tr>
<tr><td id="artist" colspan="2" align="center"></td></tr>
</table>

<label for="mv" style="font-size: 35px">Mana value:</label>
<select id="mana_value" name="mv" style="font-size: 35px;" class="no-print">
  <option>1</option>
  <option>2</option>
  <option>3</option>
  <option>4</option>
  <option>5</option>
  <option>6</option>
  <option>7</option>
  <option>8</option>
  <option>9</option>
  <option>10</option>
  <option>11</option>
  <option>12</option>
  <option>13</option>
  <option>14</option>
  <option>15</option>
  <option>16</option>
</select>

<button class="no-print" type="button" onClick="fetch(sf_url.concat('t%3Acreature+mv%3D' + document.getElementById('mana_value').value)).then( response => { return response.json() }).then((data) => { populate_card(data) });" style="font-size: 35px"> Mo </button>
<button class="no-print" type="button" onClick="fetch(sf_url.concat('t%3Aequipment+mv<%3D' + document.getElementById('mana_value').value)).then( response => { return response.json() }).then((data) => { populate_card(data) });" style="font-size: 35px"> Sto </button>

</body>
</html>
