<html>
<head>
<title>Momir Simulator</title>
<script>
const sf_url = "https://api.scryfall.com/cards/random?q=";

function generate_card(data) {
  var pop = ['name', 'mana_cost', 'type_line', 'oracle_text', 'artist', 'flavor_text', 'art_crop', 'p_t' ];
  for (const idx in pop) {
    if (pop[idx] == 'art_crop') {
      document.getElementById(pop[idx]+"2").src = "";
    }
    else {
      document.getElementById(pop[idx]+"2").innerHTML = "";
    }
  }
  if (data.card_faces) {
    populate_face(data.card_faces[0]);
    populate_face(data.card_faces[1], "2");
  }
  else {
    populate_face(data);
  }
  document.getElementById('link').innerHTML = "<a href='"+data.scryfall_uri+
    "'>View on Scryfall.com</a>";
}

function populate_face(face, offset="") {
  var pop = ['name', 'mana_cost', 'type_line', 'oracle_text', 'artist', 'flavor_text' ];
  for (const idx in pop) {
    if (face[pop[idx]]) {
      document.getElementById(pop[idx]+offset).innerHTML = manify(face[pop[idx]]);
    }
    else {
      document.getElementById(pop[idx]+offset).innerHTML = "";
    }
  }
  document.getElementById('art_crop'+offset).src = face.image_uris.art_crop;
  document.getElementById('p_t'+offset).innerHTML = (face.power > -1) ? face.power + "/" + face.toughness : "";
}

function manify(input) {
  input = input.replace(/\n/g,"<br/>");
  input = input.replace(/{/g,"<abbr class='card-symbol card-symbol-");
  input = input.replace(/}/g,"'></abbr>");
  input = input.replace(/card-symbol-(.)\/(.)/g,
                        function(match, $1, $2) {
                          return ("card-symbol-"+$1+$2);
                        });
  return input;
}

function onLoad() {
  const urlParams = new URLSearchParams(window.location.search);
  const mv = urlParams.get('mv');
  if (mv) {
    fetch(sf_url.concat('t%3Acreature+mv%3D' + mv))
      .then( response => { return response.json() })
      .then((data) => { generate_card(data) });
  }
}

</script>
<style>
td {
  font-size: 50px;
}

@media print {
  .no-print, no-print * {
    font-size: 50px;
    display: none !important;
  }
}
</style>
<link rel="stylesheet" href="card-symbols.css">
</head>
<body onLoad="onLoad()">
<table>
<tr><td id="name"></td><td id="mana_cost" align="right"></td></tr>
<tr><td id="img" colspan="2" align="center"><img id="art_crop" /></td></tr>
<tr><td id="type_line" colspan="2"></td></tr>
<tr><td id="oracle_text" colspan="2"></td></tr>
<tr><td id="p_t" colspan="2" align="right"></td></tr>
<tr><td id="flavor_text" colspan="2" style="font-style: italic; font-size: x-large;"></td></tr>
<tr><td id="artist" style="font-size: large"></td>
  <td id="link" align="right" style="font-size: large"></tr>
<tr><td id="name2"></td><td id="mana_cost2" align="right"></td></tr>
<tr><td id="img" colspan="2" align="center"><img id="art_crop2" /></td></tr>
<tr><td id="type_line2" colspan="2"></td></tr>
<tr><td id="oracle_text2" colspan="2"></td></tr>
<tr><td id="p_t2" colspan="2" align="right"></td></tr>
<tr><td id="flavor_text2" colspan="2" style="font-style: italic; font-size: x-large;"></td></tr>
<tr><td id="artist2" style="font-size: large" colspan="2"></td></tr>
</table>

<label for="mv" style="font-size: 35px">Mana value:</label>
<select id="mana_value" name="mv" style="font-size: 35px;" class="no-print">
  <option>1</option>
  <option>2</option>
  <option>3</option>
  <option>4</option>
  <option>5</option>
  <option>6</option>
  <option>7</option>
  <option>8</option>
  <option>9</option>
  <option>10</option>
  <option>11</option>
  <option>12</option>
  <option>13</option>
  <option>14</option>
  <option>15</option>
  <option>16</option>
</select>

<button class="no-print" type="button" onClick="fetch(sf_url.concat('t%3Acreature+mv%3D' + document.getElementById('mana_value').value)).then( response => { return response.json() }).then((data) => { generate_card(data) });" style="font-size: 35px"> Mo </button>
<button class="no-print" type="button" onClick="fetch(sf_url.concat('t%3Aequipment+mv<%3D' + document.getElementById('mana_value').value)).then( response => { return response.json() }).then((data) => { generate_card(data) });" style="font-size: 35px"> Sto </button>
<button class="no-print" type="button" onClick="fetch(sf_url.concat('-t%3Aland')).then( response => { return response.json() }).then((data) => { generate_card(data) });" style="font-size: 35px"> Snap </button>

</body>
</html>
